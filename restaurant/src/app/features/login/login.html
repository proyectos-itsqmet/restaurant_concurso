<!-- Minimal: floating form on gray background, social-first -->
<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center px-4 py-12">
  <!-- Logo mark -->
  <div class="flex flex-col items-center mb-8">
    <div
      class="w-12 h-12 rounded-2xl bg-zinc-900 flex items-center justify-center text-white font-black text-lg mb-3"
    >
      R
    </div>
    <h1 class="text-xl font-bold text-gray-900">Iniciar sesión</h1>
    <p class="text-sm text-gray-500 mt-1">Ingresa tus credenciales</p>
  </div>

  <!-- Email + Password -->
  <div class="w-full max-w-sm space-y-4">
    <gc-input
      inputLabel="Email"
      type="email"
      placeholder="tu@email.com"
      [value]="email()"
      [invalid]="emailInvalid()"
      [inputDescription]="emailInvalid() ? 'El email es obligatorio' : ''"
      (valueChange)="email.set($event)"
    />

    <div class="space-y-1">
      <gc-input
        inputLabel="Contraseña"
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="••••••••"
        [value]="password()"
        [invalid]="passwordInvalid()"
        [inputDescription]="passwordInvalid() ? 'La contraseña es obligatoria' : ''"
        (valueChange)="password.set($event)"
      />
      <div class="flex justify-end">
        <a href="#" class="text-xs text-gray-500 hover:text-gray-900">¿Olvidaste tu contraseña?</a>
      </div>
    </div>

    <gc-button class="w-full" [disabled]="loading()" (click)="onLogin()">
      @if (loading()) {
        <gc-spinner size="xs" color="#fff" /> Verificando...
      } @else {
        Iniciar sesión
      }
    </gc-button>

    <p class="text-center text-sm text-gray-500">
      ¿No tienes cuenta?
      <a routerLink="/examples/register" class="font-medium text-gray-900 hover:underline"
        >Regístrate gratis</a
      >
    </p>
  </div>
</div>
