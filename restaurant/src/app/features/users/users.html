<app-nav-bar></app-nav-bar>
<div class="max-w-5xl mx-auto px-4 sm:px-6">
  <h3 class="my-6 font-semibold text-gray-800 text-2xl">Registro de Usuarios</h3>
  <div class="flex my-6">
    <!-- Formulario -->
    <gc-card>
      <div class="flex flex-col gap-4">
        <gc-input
          placeholder="Nombre completo"
          inputLabel="Nombre completo"
          [value]="newUser.name"
          (valueChange)="newUser.name = $event"
        ></gc-input>
        <gc-input
          placeholder="Correo electrónico"
          inputLabel="Correo electrónico"
          [value]="newUser.email"
          (valueChange)="newUser.email = $event"
        ></gc-input>
        <gc-select
          inputLabel="Cargo"
          inputDescription="Selecciona el cargo."
          placeholder="Elige un cargo..."
          [options]="cargo"
          [value]="selectCargo"
          (valueChange)="selectCargo = $event"
        />
      </div>
      <gc-button class="mt-4" (click)="onRegisterUser()">Guardar</gc-button>
    </gc-card>
  </div>

  <app-user-list></app-user-list>
</div>
<app-footer></app-footer>
